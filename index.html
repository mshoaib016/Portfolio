<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Muhammad Shoaib - Portfolio</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Background Shapes -->
    <div class="bg-shapes">
      <div class="shape shape-1"></div>
      <div class="shape shape-2"></div>
      <div class="shape shape-3"></div>
    </div>

    <!-- Theme Toggle -->
    <button
      class="theme-toggle"
      onclick="toggleTheme()"
      aria-label="Toggle Theme"
    >
      <div class="toggle-slider">
        <div class="toggle-circle">
          <i class="fas fa-sun" id="theme-icon"></i>
        </div>
      </div>
      <span
        style="
          color: var(--text-secondary);
          font-size: 0.85rem;
          font-weight: 600;
        "
        >Theme</span
      >
    </button>

    <div class="container">
      <!-- Profile Image -->
      <div class="profile-wrapper">
        <div class="profile-ring"></div>
        <img
          src="assets/Shoaib.jpeg"
          alt="Muhammad Shoaib"
          class="profile-img"
        />
      </div>

      <!-- Status -->
      <div class="status-badge">
        <span class="status-dot"></span>
        <span>Available for work</span>
      </div>

      <!-- Content -->
      <h1>Muhammad Shoaib</h1>
      <p class="subtitle">Full Stack Developer</p>
      <p class="description">
        Crafting digital experiences with modern technologies. Specialized in
        React, Node.js, and cloud solutions.
      </p>

      <!-- Buttons -->
      <div class="buttons-container">
        <a
          href="https://www.upwork.com/freelancers/~0193824f473b9931d6"
          class="btn btn-upwork"
          target="_blank"
          rel="noopener noreferrer"
        >
          <i class="fab fa-upwork"></i>
          Upwork
        </a>

        <a
          href="https://github.com/mshoaib016"
          class="btn btn-github"
          target="_blank"
          rel="noopener noreferrer"
        >
          <i class="fab fa-github"></i>
          GitHub
        </a>

        <a
          href="portfiolio.html"
          class="btn btn-portfolio"
          target="_blank"
          rel="noopener noreferrer"
        >
          <i class="fas fa-briefcase"></i>
          Portfolio
        </a>

        <a
          href="assets/Muhammad Shoaib Professional Resume (2).pdf"
          class="btn btn-resume"
          target="_blank"
          rel="noopener noreferrer"
        >
          <i class="fas fa-file-download"></i>
          Resume
        </a>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
